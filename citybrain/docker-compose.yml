# CityBrain dedicated host ports (avoid 5432 local PG, 5433 cibeg-postgres; API stays 4000)
#   Postgres 5434 | Redis 6380 | API 4000 | Web 8180
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: citybrain
      POSTGRES_PASSWORD: citybrain
      POSTGRES_DB: citybrain
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citybrain -d citybrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://citybrain:citybrain@postgres:5432/citybrain
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      GEMINI_MODEL_FALLBACK: ${GEMINI_MODEL_FALLBACK:-gemini-2.5-flash}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      OPENROUTER_MODEL_FALLBACK: ${OPENROUTER_MODEL_FALLBACK:-openai/gpt-oss-120b:free,minimax/minimax-m2.5:free,deepseek/deepseek-v4-flash:free,google/gemma-4-31b-it:free}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-http://localhost:4000}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-4096}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://citybrain.tawha.com}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.citybrain.tawha.com}
        VITE_WS_URL: ${VITE_WS_URL:-wss://api.citybrain.tawha.com/ws}
    ports:
      - "8180:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
