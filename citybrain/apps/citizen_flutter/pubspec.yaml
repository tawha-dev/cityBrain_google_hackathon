name: citybrain_citizen
description: CityBrain citizen emergency reporting app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.2
  flutter_secure_storage: ^9.2.4
  geolocator: ^13.0.4
  google_maps_flutter: ^2.12.1
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  supertonic_flutter: ^1.0.0
  audioplayers: ^6.6.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#000000"
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icon/app_icon.png
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#000000"
    theme_color: "#00CBA9"

flutter:
  uses-material-design: true
  assets:
    - assets/config/api_config.json
    - assets/images/
